# Lyrion Music Server that drives the squeezelite player(s) feeding SWAMP inputs.
# Music Assistant streams to the zone media players; we hand that stream URL to the
# squeezelite (`lms-player-id`) via this LMS so it renders to the SWAMP analog input.
lms:
  host: 192.168.1.240
  port: 9000

# Volume (0-100) applied to a zone the first time it is played when it has no level
# yet, so a freshly-played zone isn't silent. Overridable per target below.
default-volume: 40

sources:
  # MA-rendered source: squeezelite on `lms-player-id` feeds SWAMP analog input 4.
  - id: whole-house
    name: Whole-House
    swamp-source-id: 4
    lms-player-id: "ca:08:d2:cf:1a:bf"
  # Hardware sources (no lms-player-id) are not yet selectable from MA zones.
  - id: player-a
    name: Player A
    swamp-source-id: 5
  - id: music-main
    name: Main
    swamp-source-id: 6

targets:
  - id: office-terrace
    name: Office Terrace
    default-volume: 30  # optional per-zone override of the global default-volume
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 1
  - id: outdoor-shower
    name: Outdoor Shower
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 3
  - id: guest-house
    name: Guest House
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 4
  - id: library
    name: Library
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 5
  - id: master-patio
    name: Master Patio
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 6
  - id: master-bedroom
    name: Master Bedroom
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 7
  - id: master-bathroom
    name: Master Bathroom
    swamp-zones:
      - unit: 3 # Main SWAMP
        zone: 8
  - id: office
    name: Office
    swamp-zones:
      - unit: 4 # Expander 1
        zone: 1
  - id: great-room
    name: Great Room
    swamp-zones:
      - unit: 4 # Expander 1
        zone: 2
      - unit: 4 # Expander 1
        zone: 3
#  - name: Mom Wing
#    id: mom-wing
#    zones:
#      - unit: 4 # Expander 1
#        zone: 4
  - id: kitchen
    name: Kitchen
    swamp-zones:
      - unit: 4 # Expander 1
        zone: 5
      - unit: 4 # Expander 1
        zone: 6
  - id: loggia
    name: Loggia
    swamp-zones:
      - unit: 5 # Expander 2
        zone: 1
      - unit: 5 # Expander 2
        zone: 2
      - unit: 5 # Expander 2
        zone: 3
      - unit: 5 # Expander 2
        zone: 4
      - unit: 5 # Expander 2
        zone: 5
